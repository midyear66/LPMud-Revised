# ldmud args file (one flag per line)
# See: ldmud --help

# Compat mode for 2.4.5 mudlib
--compat

# Mudlib directory
--mudlib /mud/lib

# Master object (relative to mudlib root)
--master obj/master

# Logging
--debug-file /mud/log/debug.log

# Swap file
--swap-file /mud/tmp/swap

# Runtime limits
--max-array 5000
--max-mapping 5000
--max-bytes 100000

# Reserve memory for error handling
--reserve-user 500000
--reserve-master 200000
--reserve-system 500000

# Disable erq (not needed for basic setup)
--no-erq

# Port
4000
