services:
  lpmud:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lpmud-server
    ports:
      - "4000:4000"
    volumes:
      # Mount mudlib for live editing (optional — remove for production)
      - ../mudlib:/mud/lib
      # Persist logs and save data
      - lpmud-logs:/mud/log
      - lpmud-save:/mud/save
    restart: unless-stopped

  tools:
    image: python:3.12-slim
    volumes:
      - ../mudlib:/mud/lib:ro
      - ../scripts:/scripts:ro
      - ../docs:/docs
    working_dir: /
    entrypoint: ["sh", "-c", "pip install -q -r /scripts/requirements.txt && python3 /scripts/generate-map.py --mudlib /mud/lib --output /docs"]
    profiles: ["tools"]

volumes:
  lpmud-logs:
  lpmud-save:
