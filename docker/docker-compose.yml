services:
  lpmud:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lpmud-server
    ports:
      - "4000:4000"
    volumes:
      # Mount mudlib for live editing (optional — remove for production)
      - ../mudlib:/mud/lib
      # Persist logs and player save data
      - lpmud-logs:/mud/log
      - lpmud-save:/mud/lib/players
    restart: unless-stopped

  tools:
    image: python:3.12-slim
    volumes:
      - ../mudlib:/mud/lib:ro
      - ../scripts:/scripts:ro
      - ../docs:/docs
    working_dir: /
    entrypoint: ["sh", "-c", "pip install -q -r /scripts/requirements.txt && python3 /scripts/generate-map.py --mudlib /mud/lib --output /docs"]
    profiles: ["tools"]

  admin:
    build:
      context: ..
      dockerfile: admin/Dockerfile
    container_name: lpmud-admin
    ports:
      - "8080:8080"              # Use 127.0.0.1:8080:8080 in production
    volumes:
      - ../mudlib:/mud/lib:ro    # Read-only — can backup but not modify
      - lpmud-save:/mud/players
      - lpmud-logs:/mud/log
      - ../docs:/docs
      - ../scripts:/scripts:ro
      - lpmud-backups:/backups
      - lpmud-admin-data:/admin-data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - LPMUD_CONTAINER_NAME=lpmud-server
    group_add:
      - "${DOCKER_GID:-0}"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    depends_on:
      - lpmud

volumes:
  lpmud-logs:
  lpmud-save:
  lpmud-backups:
  lpmud-admin-data:
